# Mantiene el servicio Render despierto en horario laboral (Perú, UTC-5).
# Render free duerme tras ~15 min sin tráfico; este ping evita la pantalla "Welcome to Render".
name: Keep Render awake

on:
  schedule:
    # Lun–Vie: cada 10 min, ~07:00–18:50 hora Perú (12:00–23:50 UTC)
    - cron: "*/10 12-23 * * 1-5"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard health
        run: |
          URL="https://acr-dashboard-5iqz.onrender.com/api/health"
          code=$(curl -fsS -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP $code"
          cat /tmp/health.json || true
          test "$code" = "200"
