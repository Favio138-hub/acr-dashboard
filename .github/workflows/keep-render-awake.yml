# Refuerzo: ping cada 5 min (24/7). NO confíe solo en esto — GitHub puede retrasar crons.
# Solución fiable: cron-job.org (ver scripts/configurar_ping_render.ps1)
name: Keep Render awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard health
        run: |
          URL="https://acr-dashboard-5iqz.onrender.com/api/health"
          for i in 1 2 3; do
            code=$(curl -fsS -o /tmp/health.json -w "%{http_code}" --max-time 120 "$URL" || echo "000")
            echo "Intento $i — HTTP $code"
            cat /tmp/health.json 2>/dev/null || true
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          exit 1
