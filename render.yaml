# Blueprint Render.com — conectar repo GitHub y desplegar con un clic
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: acr-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r backend_python/requirements.txt
    startCommand: cd backend_python && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
